#docker compose -f ../civicpatch-tools/civicpatch/docker-compose.development.yml run --rm civicpatch uv run \
#  python src/cli/cli.py \
#    get_juds \
#    --num-jurisdictions "3" \
#    --state "wa"
#"""

[tasks.generate-data-comment]
run = """
uv run --quiet python scripts/github_actions/local/pull_request/generate_data_comment.py {{ option(name="jurisdiction-ocdid") }}
"""

[tasks.test-generate-review-comment]
run = """
uv run python scripts/github_actions/local/pull_request/generate_review_comment.py ocd-jurisdiction/country:us/state:wa/place:seattle/government
"""

[tasks.generate-review-comment]
# Ex: mise generate-review-comment --jurisdiction-ocdid ocd-jurisdiction/country:us/state:wa/place:spokane
run = """
uv run --quiet python scripts/github_actions/local/pull_request/generate_review_comment.py {{ option(name="jurisdiction-ocdid") }}
"""

[tasks.validate_texas_google]
run = """
uv run python scripts/one_off/validate_local.py \
  --yaml-dir data/tx/local \
  --json-file scripts/track_progress/google_data/tx_all_processed.json \
  --out-dir data_source/tx/local/validation/google
"""

[tasks.scrape_texas_tml]
run = """
uv run python data_source/tx/local/validation/tml/scrape_tml_search.py \
  --search-url "https://directory.tml.org/results?search%5Btitle%5D%5B%5D=ABAC&search%5Btitle%5D%5B%5D=ABAD&search%5Btitle%5D%5B%5D=AB02&search%5Btitle%5D%5B%5D=AAAA&search%5Btitle%5D%5B%5D=AB01&search%5Bsubmit%5D=&search%5Btype%5D=title" \
  --out data_source/tx/local/validation/tml/tml_raw.json \
  --delay 1.0 --individual-delay 0.5 --resume
"""

[tasks.validate_texas_tml]
run = """
uv run python data_source/tx/local/validation/tml/validate_tml.py \
  --tml-file data_source/tx/local/validation/tml/tml_raw.json \
  --yaml-dir data/tx/local \
  --out-dir data_source/tx/local/validation/tml
"""
