[tools]
uv = "latest"
python = "3.12.11" # must be after poetry so the poetry bin is first in PATH
gh = "latest"
aws = "2.34"

[env]
_.file = ".env"
VIRTUAL_ENV = "./.venv"
PYTHONPATH = "."

[tasks.comp]
run = """
python3 ocdid_progress_tracker/main.py
"""

[tasks.readme]
run = """
uv run python scripts/track_progress/generate_progress.py
"""

[tasks.compare]
run = """
uv run python scripts/track_progress/compare.py {{ arg(name="state", default="") }}
"""

[tasks.convert-test]
run = """
uv run python scripts/one_off/test_convert_small.py
"""

[tasks.convert-test-delete]
run = """
uv run python scripts/one_off/test_convert_small.py --delete-original
"""

[tasks.convert-all]
run = """
uv run python scripts/one_off/convert_to_people_schema.py
"""

[tasks.convert-all-delete]
run = """
uv run python scripts/one_off/convert_to_people_schema.py --delete-original
"""

[tasks.validate-jurisdiction]
run = """
uv run python scripts/github_actions/validate_jurisdiction.py $@
"""

[tasks.test-env]
run = """
uv run python scripts/one_off/test_env.py
"""

[tasks.setup-state]
run = """
uv run python scripts/setup_state.py $@
"""

[tasks.setup-maps]
description = "Download map GeoJSONs from Census TIGER and upload to R2. Run before generate-pmtiles. Args: --state co"
run = """
uv run python scripts/setup_maps.py $@
"""

[tasks.generate-pmtiles]
description = "Generate PMTiles from R2 GeoJSONs and upload to R2. Args: --state co"
run = """
uv run python scripts/generate_pmtiles.py $@
"""

[tasks.add-shared]
run = """
.venv/bin/pip install "git+https://github.com/CivicPatch/civicpatch-tools.git#subdirectory=shared"
"""

#############################################
## GITHUB ACTIONS
#############################################

[tasks.get-juds]
run = """
curl -s -X GET "${CIVICPATCH_ORG_URL}/api/v1/jurisdictions/available?num_jurisdictions={{ option(name='num-jurisdictions') }}&state={{ option(name='state') }}" \
  -H "Authorization: ${API_CIVICPATCH_ORG_TOKEN}"
"""
