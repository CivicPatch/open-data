name: "[auto] Post Merge - Process Data"
on:
  push:
    branches: [main]
    paths:
      - "data/**/*.yml" # newly scraped jurisdiction
env:
  PYTHONPATH: ${{ github.workspace }}

permissions:
  contents: write

concurrency:
  group: "post-merge-people"
  cancel-in-progress: false

jobs:
  process-updated-jurisdictions-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 100

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Process all jurisdictions
        env:
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
          FRIENDLY_STORAGE_HOST: ${{ vars.FRIENDLY_STORAGE_HOST }}
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "No previous commit to diff against (branch creation or force-push) — treating as no changes."
            CHANGED_FILES=""
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=d "$BEFORE_SHA" "${{ github.sha }}" -- 'data/**/local/*.yml')
          fi
          echo "$CHANGED_FILES" | uv run python scripts/github_actions/local/post_merge/process_updated_jurisdiction_data.py

      - name: Show updated OCDIDs
        run: |
          cat updated_jurisdiction_ocdids.txt

      - name: Commit updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git stash
          git pull --rebase origin main
          git stash pop || true
          if [ -n "$(git status --porcelain)" ]; then
            git add data/
            git commit -m "Process updated jurisdictions [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Call od_sync
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          CIVICPATCH_ORG_URL: ${{ vars.CIVICPATCH_ORG_URL }}
        run: |
          JURISDICTION_OCDIDS_ARRAY=$(cat updated_jurisdiction_ocdids.txt | jq -R -s -c 'split("\n")[:-1]')
          echo "Updated jurisdiction OCDIDs: $JURISDICTION_OCDIDS_ARRAY"
          curl -X POST "$CIVICPATCH_ORG_URL/api/admin/od_sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: $SERVICE_API_KEY" \
            --fail-with-body \
            -d "{\"jurisdiction_ocdids\": $JURISDICTION_OCDIDS_ARRAY}"
